baseURL = "https://sdttttt.online/"
title = "Last Regrets"
author = "sdttttt"
copyright = "© 2026, sdttttt"
languageCode = "zh"
DefaultContentLanguage = "zh"
enableInlineShortcodes = true
ignoreErrors = ["error-remote-getjson"]
enableGitInfo = true

theme = "PaperMod"

[params]
  defaultTheme = "auto"
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  ShowWordCount = true
  ShowLastMod = true

  [params.homeInfoParams]
    Title = "sdttttt"
    Content = "普通的魔法师"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/sdttttt"

[params.assets]
  favicon = "/favicon.ico"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[menu]
  [[menu.main]]
    identifier = "archives"
    name = "Archives"
    url = "/archives/"
    weight = 5
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 15
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 20

[taxonomies]
category = "categories"
tag = "tags"
series = "series"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
